<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spooky Milk Life Demo</title>
    <style>
        /* Removes all margins and keeps the window from scrolling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Black background to match the game screen */
        }

        /* Makes the game fill the entire browser viewport */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Using the specific link you found -->
    <iframe 
        id="game-box"
        src="https://html-classic.itch.zone/html/11053363/index.html?v=1732313558" 
        allow="autoplay; fullscreen; keyboard-quotas; gamepad; accelerometer; gyroscope" 
        allowfullscreen="true">
    </iframe>

    <script>
        /* 
           This script ensures the game gets focus for keyboard controls 
           as soon as you click the page.
        */
        window.onclick = function() {
            document.getElementById('game-box').focus();
        };

        window.onload = function() {
            document.getElementById('game-box').focus();
        };
    </script>

</body>
</html>
