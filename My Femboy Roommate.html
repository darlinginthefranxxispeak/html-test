<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Changing the title to something boring helps avoid manual teacher checks -->
    <title>My Femboy Roommate</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff; /* White background looks more like a school doc */
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
        
        #load-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            opacity: 0.1; /* Very faint button so it's not obvious */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <iframe id="main-frame" allow="autoplay; fullscreen; gamepad" allowfullscreen="true"></iframe>

    <script>
        (function() {
            // This is the itch.io link encoded in Base64 to hide it from scanners
            // URL: https://html-classic.itch.zone/html/12773276/Roommate-Demo-web/index.html
            const encodedUrl = "aHR0cHM6Ly9odG1sLWNsYXNzaWMuaXRjaC56b25lL2h0bWwvMTI3NzMyNzYvUm9vbW1hdGUtRGVtby13ZWIvaW5kZXguaHRtbA==";
            const decodedUrl = atob(encodedUrl);

            const frame = document.getElementById('main-frame');

            // We use srcdoc instead of a Blob URL, which is less likely to be flagged
            const innerHTML = `
                <html>
                <head>
                    <style>
                        body,html{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:#000;}
                        iframe{width:100vw;height:100vh;border:none;}
                    </style>
                </head>
                <body>
                    <iframe src="${decodedUrl}" allow="autoplay; fullscreen; gamepad" allowfullscreen="true"></iframe>
                </body>
                </html>
            `;

            frame.srcdoc = innerHTML;

            // Auto-focus logic
            window.onclick = () => { frame.focus(); };
        })();
    </script>
</body>
</html>
