<!DOCTYPE html>
<html>
<head>
    <title>Google Drive - Shared Document</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f1f3f4; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .icon { width: 64px; height: 64px; margin-bottom: 20px; }
        .message { font-size: 18px; color: #3c4043; margin-bottom: 10px; }
        .sub-message { font-size: 14px; color: #70757a; margin-bottom: 20px; }
        #load-btn { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-weight: 500; }
        #load-btn:hover { background-color: #1765cc; }
    </style>
</head>
<body>

    <img class="icon" src="https://ssl.gstatic.com/docs/doclist/images/mediatype/icon_1_pdf_x64.png" alt="PDF Icon">
    <div class="message">Request access to "Final_Project_Source.pdf"</div>
    <div class="sub-message">Your session has expired. Please re-authenticate to view.</div>
    <button id="load-btn">Request Access</button>

    <script>
        // We are using Google Translate as a "tunnel" to bypass the network block.
        // The filter sees you visiting "translate.google.com", which is usually allowed.
        
        // Link 1: Roommate Demo
        const link1 = "https://translate.google.com/translate?sl=ja&tl=en&u=https://html-classic.itch.zone/html/12773276/Roommate-Demo-web/index.html";
        
        // Link 2: Entity
        const link2 = "https://translate.google.com/translate?sl=ja&tl=en&u=https://html-classic.itch.zone/html/17362678/index.html?v=1777542245";

        document.getElementById('load-btn').onclick = function() {
            // This creates the "About:Blank" tab
            const win = window.open('about:blank', '_blank');
            
            // This builds a frame inside that tab that goes THROUGH Google Translate
            win.document.body.innerHTML = `
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
                    iframe { width: 100vw; height: 100vh; border: none; }
                    #gt-badge { display: none !important; } /* Try to hide translate bar */
                </style>
                <iframe src="${link1}"></iframe>
            `;

            // Redirect this tab to Google Drive so it looks like you are waiting for access
            window.location.href = "https://drive.google.com/drive/my-drive";
        };
    </script>
</body>
</html>
