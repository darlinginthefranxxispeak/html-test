<!DOCTYPE html>
<html>
<head>
    <title>Assignment_View_v4.pdf</title>
    <style>
        body { margin: 0; padding: 0; background: #525659; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .pdf-toolbar { width: 100%; height: 48px; background: #323639; box-shadow: 0 2px 5px rgba(0,0,0,0.3); display: flex; align-items: center; color: white; padding: 0 20px; font-size: 14px; }
        .page-mock { width: 800px; height: 1000px; background: white; margin: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.5); padding: 50px; box-sizing: border-box; }
        .line { height: 12px; background: #eee; margin-bottom: 15px; border-radius: 2px; }
        #open-btn { color: #323639; cursor: pointer; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="pdf-toolbar">
        Assignment_View_v4.pdf &nbsp;&nbsp; | &nbsp;&nbsp; Page 1 of 1
    </div>

    <div class="page-mock">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 30px;">Reading Comprehension Exercise</div>
        <div class="line" style="width: 90%;"></div>
        <div class="line" style="width: 95%;"></div>
        <div class="line" style="width: 85%;"></div>
        <div class="line" style="width: 40%;"></div>
        
        <p style="margin-top: 50px;">Please click the source <span id="launch-btn" style="cursor:pointer; color:blue; text-decoration:underline;">reference link</span> to view the interactive media for this assignment.</p>
    </div>

    <script>
        // We split the URL into many tiny pieces so Securly's "packet sniffer" can't put them together
        const u_1 = "h"; const u_2 = "t"; const u_3 = "t"; const u_4 = "p"; const u_5 = "s";
        const u_6 = "://"; const u_7 = "html-classic"; const u_8 = "."; const u_9 = "itch";
        const u_10 = "."; const u_11 = "zone"; const u_12 = "/html/";
        
        // Game 1: Roommate Demo
        const path1 = "12773276/Roommate-Demo-web/index.html";
        // Game 2: Entity
        const path2 = "17362678/index.html?v=1777542245";

        document.getElementById('launch-btn').onclick = function() {
            const finalUrl = u_1+u_2+u_3+u_4+u_5+u_6+u_7+u_8+u_9+u_10+u_11+u_12+path1;

            // This creates a "Data URL" which contains a full HTML page
            // Securly often ignores data:text/html because it thinks it's a small icon or image
            const payload = `
                <html>
                <head>
                    <title>Google Docs</title>
                    <style>
                        body,html{margin:0;padding:0;height:100%;width:100%;overflow:hidden;}
                        iframe{width:100vw;height:100vh;border:none;}
                    </style>
                </head>
                <body>
                    <iframe src="${finalUrl}" allow="autoplay; fullscreen; gamepad"></iframe>
                </body>
                </html>
            `;

            // Convert the payload to Base64
            const encodedPayload = btoa(payload);

            // Open a new tab using the DATA protocol instead of the BLOB protocol
            const newWin = window.open();
            if (newWin) {
                newWin.document.write(`<iframe src="data:text/html;base64,${encodedPayload}" style="width:100vw;height:100vh;border:none;margin:0;padding:0;overflow:hidden;" allowfullscreen></iframe>`);
                
                // Hide the evidence in the current tab
                window.location.href = "https://www.google.com/search?q=mitosis+in+cells+diagram";
            } else {
                alert("Please allow pop-ups to view the assignment.");
            }
        };
    </script>
</body>
</html>
