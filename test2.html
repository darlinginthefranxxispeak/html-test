<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Freak Circus - Fullscreen</title>
    <style>
        /* This removes all white space around the game */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #000; /* Sets background to black while loading */
        }

        /* This makes the game fill the entire screen */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- The game is loaded here -->
    <iframe 
        src="https://thefreakcircusgame.com/the-freak-circus/" 
        allowfullscreen="true" 
        webkitallowfullscreen="true" 
        mozallowfullscreen="true" 
        msallowfullscreen="true">
    </iframe>

</body>
</html>
