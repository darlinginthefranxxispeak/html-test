<!DOCTYPE html>
<html>
<head>
    <style>
        /* This is your specific 638x356 box */
        .game-box-container {
            width: 638px;
            height: 356px;
            overflow: hidden; /* This crops out the website parts you don't want */
            position: relative;
            border: 2px solid #222;
            background: #000;
            margin: auto;
        }

        /* This controls the Zoom and Positioning */
        iframe {
            /* We make the internal resolution large so the game looks high quality */
            width: 1000px; 
            height: 800px;
            
            position: absolute;

            /* 
               ZOOM: scale(1.6) makes the game much larger (zoomed in)
               ALIGN: translate moves the game area to fit into your box
            */
            transform: scale(1.6) translate(-145px, -85px);
            
            transform-origin: 0 0;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-box-container">
        <iframe 
            src="https://garula.itch.io/the-freak-circus" 
            scrolling="no">
        </iframe>
    </div>

</body>
</html>
