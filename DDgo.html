<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dashboard</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .launch-card {
            text-align: center;
            padding: 30px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #1a1a1a;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            transition: 0.2s;
        }
        button:hover {
            background: #2563eb;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="launch-card">
        <h2>Secure Web Environment</h2>
        <p>Gamepad: <span style="color:red">Disabled</span></p>
        <button id="open-btn">Launch Persistent Browser</button>
    </div>

    <script>
        document.getElementById('open-btn').onclick = function() {
            // 1. The search engine (using a frame-friendly Google mirror)
            const siteUrl = "https://www.google.com/search?igu=1";

            // 2. The Blob content (The persistent wrapper)
            const blobContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta name="referrer" content="no-referrer">
                    <title>Classes</title>
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #fff; }
                        iframe { width: 100vw; height: 100vh; border: none; position: absolute; top: 0; left: 0; }
                    </style>
                </head>
                <body>
                    <iframe src="${siteUrl}" allow="autoplay; fullscreen; keyboard-quotas" allowfullscreen="true"></iframe>
                </body>
                </html>
            `.trim();

            // 3. Create the Blob
            const blob = new Blob([blobContent], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);

            // 4. Open a new window that stays at 'about:blank'
            const win = window.open('about:blank', '_blank');

            // 5. Inject the Blob into the new window
            // This ensures that even as you click links, the top URL stays about:blank
            if (win) {
                win.document.write(\`
                    <iframe src="${blobUrl}" style="position:fixed; top:0; left:0; width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden; z-index:999999;"></iframe>
                \`);
                win.document.close();
            } else {
                alert("Pop-up blocked! Please allow pop-ups to launch the browser.");
            }
        };
    </script>

</body>
</html>
