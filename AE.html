<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomaly Evolution</title>
    <style>
        /* Removes browser borders and prevents scrolling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Dark background keeps it looking professional */
        }

        /* Forces the game frame to fill the entire window */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Using the specific direct link you provided -->
    <iframe 
        id="game-box"
        src="https://html-classic.itch.zone/html/14299674/index.html" 
        allow="autoplay; fullscreen; keyboard-quotas; gamepad; accelerometer; gyroscope" 
        allowfullscreen="true">
    </iframe>

    <script>
        /* 
           Keyboard Focus Script: 
           This makes sure the game hears your key presses (WASD, Space, etc.) 
           the moment you click on the page.
        */
        window.onclick = function() {
            document.getElementById('game-box').focus();
        };

        window.onload = function() {
            document.getElementById('game-box').focus();
        };
    </script>

</body>
</html>
