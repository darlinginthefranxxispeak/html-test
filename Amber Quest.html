<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amber Quest</title>
    <style>
        /* Removes all browser borders and prevents scrolling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Forces the game window to fill the entire browser window */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Main container (gamepad permission removed) -->
    <iframe 
        id="game-loader"
        src="about:blank" 
        allow="autoplay; fullscreen; keyboard-quotas" 
        allowfullscreen="true">
    </iframe>

    <script>
        // 1. The specific game source link provided
        const gameSource = "https://html-classic.itch.zone/html/5187726/index.html?v=1732313170";

        // 2. Create the internal HTML structure for the Blob (gamepad permission removed)
        const blobContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                    iframe { width: 100vw; height: 100vh; border: none; }
                </style>
            </head>
            <body>
                <iframe src="${gameSource}" allow="autoplay; fullscreen; keyboard-quotas" allowfullscreen="true"></iframe>
            </body>
            </html>
        `;

        // 3. Create the Blob object and a local URL for it
        const blob = new Blob([blobContent], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);

        // 4. Set the main iframe's source to the new Blob URL
        const frame = document.getElementById('game-loader');
        frame.src = blobUrl;

        /* 
           Keyboard Fix: Ensures the game "grabs" your keyboard focus 
           as soon as you click anywhere on the screen.
        */
        window.onclick = function() {
            frame.focus();
        };

        window.onload = function() {
            frame.focus();
        };
    </script>

</body>
</html>
