<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Freak Circus - Fullscreen Game</title>
    <style>
        /* This part makes the background black and removes all gaps */
        body, html {
            margin: 0;
            padding: 0;
            width: 50%;
            height: 50%;
            overflow: hidden;
            background-color: #000;
        }

        /* This container is exactly the size of the game */
        .crop-box {
            width: 911px;
            height: 648px;
            overflow: hidden;
            position: absolute;
            top: 100%;
            left: 100%;
            
            /* This line makes the game stretch to fill your entire screen */
            transform: translate(-50%, -50%) scale(calc(100vw / 911), calc(100vh / 648));
            transform-origin: center;
        }

        /* This positions the website inside the box to show ONLY the game */
        iframe {
            position: absolute;
            
            /* ADJUSTED OFFSETS BASED ON YOUR SCREENSHOT */
            top: -465px;  /* Pushes the header/stars out of view */
            left: -144px; /* Centers the game window */
            
            width: 1200px; /* Keep the width wide so the site doesn't change layout */
            height: 1200px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="crop-box">
        <iframe 
            src="https://thefreakcircusgame.com/the-freak-circus/" 
            scrolling="no">
        </iframe>
    </div>

</body>
</html>
