<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 20px; font-weight: 300; }
        button {
            padding: 15px 40px;
            font-size: 1.1rem;
            cursor: pointer;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        p {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Secure Browser</h1>
        <button id="launch-btn">Launch DuckDuckGo</button>
        <p>Opens in a cloaked about:blank tab</p>
    </div>

    <script>
        document.getElementById('launch-btn').onclick = function() {
            // 1. The target site
            const targetUrl = "https://duckduckgo.com";

            // 2. Create the internal content for the Blob (Gamepad Removed)
            const blobContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Classes</title>
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #fff; }
                        iframe { width: 100vw; height: 100vh; border: none; }
                    </style>
                </head>
                <body>
                    <iframe src="${targetUrl}" allow="autoplay; fullscreen; keyboard-quotas" allowfullscreen="true"></iframe>
                </body>
                </html>
            `;

            // 3. Generate the Blob
            const blob = new Blob([blobContent], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);

            // 4. THE CLOAK: Open a new window and inject the Blob
            // This is the only way to make sites like DuckDuckGo load properly
            const win = window.open('about:blank', '_blank');
            if (win) {
                win.document.write(`
                    <iframe src="${blobUrl}" style="position:fixed; top:0; left:0; width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden; z-index:999999;"></iframe>
                `);
                win.document.close();
            } else {
                alert("Please allow pop-ups to launch the browser.");
            }
        };
    </script>

</body>
</html>
