<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Freak Circus - Full Game View</title>
    <style>
        /* Removes all margins and scrollbars from the browser */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This is your fixed 911x648 crop area */
        .crop-container {
            width: 911px;
            height: 648px;
            overflow: hidden;
            position: relative;
            
            /* This line scales the game to fit your specific screen size */
            /* It makes the 911x648 box 'grow' to fill your window */
            transform: scale(min(calc(100vw / 911), calc(100vh / 648)));
            transform-origin: center;
        }

        /* This positions the website inside your crop area */
        iframe {
            position: absolute;
            
            /* The specific offsets to align the game */
            top: -235px;  
            left: -135px; 
            
            /* The base size of the website layout */
            width: 1200px;
            height: 1000px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="crop-container">
        <iframe 
            src="https://thefreakcircusgame.com/the-freak-circus/" 
            scrolling="no">
        </iframe>
    </div>

</body>
</html>
