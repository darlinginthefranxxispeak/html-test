<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Freak Circus - Fullscreen</title>
    <style>
        /* Removes all margins and scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* This is your new 997x494 crop area */
        .game-container {
            width: 997px;
            height: 494px;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            
            /* This stretches the 997x494 box to match your screen size perfectly */
            transform-origin: 0 0;
            transform: scale(calc(100vw / 997), calc(100vh / 494));
        }

        /* This positions the website inside the container */
        iframe {
            position: absolute;
            
            /* Adjusted 'Aim' based on your new dimensions */
            top: -465px;  /* Moves the page up to hide header/stars */
            left: -100px; /* Moves the page left to center the game */
            
            width: 1200px; 
            height: 2000px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <iframe 
            src="https://thefreakcircusgame.com/the-freak-circus/" 
            scrolling="no">
        </iframe>
    </div>

</body>
</html>
