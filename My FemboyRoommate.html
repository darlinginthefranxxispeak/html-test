<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game View</title>
    <style>
        /* Removes browser borders and prevents scrolling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Forces the game window to fill every pixel of the browser window */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Main iframe container -->
    <iframe 
        id="game-player"
        src="about:blank" 
        allow="autoplay; fullscreen; keyboard-quotas; gamepad" 
        allowfullscreen="true">
    </iframe>

    <script>
        // 1. The Direct Link to the game
        const gameUrl = "https://html-classic.itch.zone/html/12773276/Roommate-Demo-web/index.html";

        // 2. Define the Blob content
        // This creates a hidden internal structure so the URL doesn't show in the main inspector
        const blobContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                    iframe { width: 100vw; height: 100vh; border: none; }
                </style>
            </head>
            <body>
                <iframe src="${gameUrl}" allow="autoplay; fullscreen; keyboard-quotas; gamepad" allowfullscreen="true"></iframe>
            </body>
            </html>
        `;

        // 3. Create the Blob object and a local URL for it
        const blob = new Blob([blobContent], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);

        // 4. Load the Blob URL into the main iframe
        const frame = document.getElementById('game-player');
        frame.src = blobUrl;

        /* 
           Keyboard Fix: This ensures that as soon as you click the screen, 
           the game gets focus so the keys work instantly.
        */
        window.onclick = function() {
            frame.focus();
        };

        window.onload = function() {
            frame.focus();
        };
    </script>

</body>
</html>
