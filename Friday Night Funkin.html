<!DOCTYPE html>
<html>
<head>
    <title>Academic Resource</title>
</head>
<body>
    <button onclick="launch()">View Bibliography</button>

    <script>
    function launch() {
        const gameUrl = "https://html-classic.itch.zone/html/16944508-1582492/index.html?v=1774567857";
        const html = `
            <html>
            <body style="margin:0;overflow:hidden">
                <iframe src="${gameUrl}" style="width:100vw;height:100vh;border:none;"></iframe>
            </body>
            </html>`;
        
        const blob = new Blob([html], {type: 'text/html'});
        const blobUrl = URL.createObjectURL(blob);
        window.location.href = blobUrl;
    }
    </script>
</body>
</html>
