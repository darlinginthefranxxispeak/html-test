<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Fullscreen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        id="game-frame"
        src="about:blank" 
        allow="autoplay; fullscreen; keyboard-quotas; gamepad" 
        allowfullscreen="true">
    </iframe>

    <script>
        /* 
           NOTE: I removed ".zip" from the end of your link. 
           If you leave the .zip, the game won't load and will only download.
        */
        const gameUrl = "https://uploads.ungrounded.net/alternate/1528000/1528775_alternate_113347_r142/";

        const blobHTML = `
            <!DOCTYPE html>
            <html>
            <head>
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                    iframe { width: 100vw; height: 100vh; border: none; }
                </style>
            </head>
            <body>
                <iframe src="${gameUrl}" allow="autoplay; fullscreen; keyboard-quotas; gamepad" allowfullscreen="true"></iframe>
            </body>
            </html>
        `;

        const blob = new Blob([blobHTML], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);

        const frame = document.getElementById('game-frame');
        frame.src = blobUrl;

        // Focus fix for controls
        window.onclick = function() {
            frame.focus();
        };
        window.onload = function() {
            frame.focus();
        };
    </script>

</body>
</html>
