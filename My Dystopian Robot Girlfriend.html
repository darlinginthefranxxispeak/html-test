<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dystopian Robot Girlfriend</title>
    <style>
        /* This removes all browser margins and hides scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Keeps the screen black during loading */
        }

        /* This forces the game to fill the entire window */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Using the direct link you found -->
    <iframe 
        id="game-box"
        src="https://html-classic.itch.zone/html/9678148-1603132/index.html?v=1775675187" 
        allow="autoplay; fullscreen; keyboard-quotas; gamepad; accelerometer; gyroscope" 
        allowfullscreen="true">
    </iframe>

    <script>
        /* 
           This script makes sure that the game captures your keyboard 
           (WASD, Arrow Keys, Space) as soon as you click the page.
        */
        window.onclick = function() {
            document.getElementById('game-box').focus();
        };

        window.onload = function() {
            document.getElementById('game-box').focus();
        };
    </script>

</body>
</html>
