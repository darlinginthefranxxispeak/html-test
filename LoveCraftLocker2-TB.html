<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovecraft Locker 2 Tentacle Breach</title>
    <style>
        /* Removes all margins and prevents browser scrollbars from appearing */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Keeps the background black while loading */
        }

        /* Forces the game frame to take up 100% of the browser window */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Using the direct source link you provided -->
    <iframe 
        id="game-frame"
        src="https://html-classic.itch.zone/html/16133272/index.html" 
        allow="autoplay; fullscreen; keyboard-quotas; gamepad; accelerometer; gyroscope" 
        allowfullscreen="true">
    </iframe>

    <script>
        /* 
           This script makes sure the game "grabs" your keyboard focus 
           (for WASD, Arrows, or Spacebar) as soon as you click the page.
        */
        window.onclick = function() {
            document.getElementById('game-frame').focus();
        };

        window.onload = function() {
            document.getElementById('game-frame').focus();
        };
    </script>

</body>
</html>
