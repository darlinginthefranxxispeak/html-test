<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNF</title>
    <style>
        /* Removes all borders and scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Makes the game box fill the entire browser window */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- The iframe starts blank; the Blob script will fill it -->
    <iframe 
        id="fnf-game"
        src="about:blank" 
        allow="autoplay; fullscreen; keyboard-quotas; gamepad" 
        allowfullscreen="true">
    </iframe>

    <script>
        // 1. The original game source link
        const gameSource = "https://html-classic.itch.zone/html/16944508-1582492/index.html?v=1774567857";

        // 2. Create the HTML content that will live inside the Blob
        const blobHTML = `
            <!DOCTYPE html>
            <html>
            <head>
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                    iframe { width: 100vw; height: 100vh; border: none; }
                </style>
            </head>
            <body>
                <iframe src="${gameSource}" allow="autoplay; fullscreen; keyboard-quotas; gamepad" allowfullscreen="true"></iframe>
            </body>
            </html>
        `;

        // 3. Create the Blob and the Blob URL
        const blob = new Blob([blobHTML], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);

        // 4. Inject the Blob URL into our main iframe
        const gameIframe = document.getElementById('fnf-game');
        gameIframe.src = blobUrl;

        // Rhythm game fix: Ensures the game grabs keyboard focus
        window.onclick = function() {
            gameIframe.focus();
        };
        
        window.onload = function() {
            gameIframe.focus();
        };
    </script>

</body>
</html>
