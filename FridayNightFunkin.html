<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Resource</title>
    <style>
        body { 
            background-color: #222; 
            color: white; 
            font-family: sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h2>Click to open securely</h2>
    <p><i>Note: You may need to "Allow Pop-ups" if your browser blocks it.</i></p>
    <button onclick="launchCloaked()">Launch Game</button>

    <script>
        function launchCloaked() {
            // 1. Open a ghost tab that extensions struggle to monitor
            let win = window.open('about:blank', '_blank');
            
            // If the browser blocks the popup, warn the user
            if (!win) {
                alert("Popup blocked! Please allow popups for this file to launch the game.");
                return;
            }

            // 2. The direct itch.io link
            const gameUrl = "https://html-classic.itch.zone/html/16944508-1582492/index.html?v=1774567857";

            // 3. We inject a fake title, fake icon, and the game iframe into the ghost tab
            // Notice the 'sandbox' attribute - this traps the game so it can't redirect the tab and expose itself
            const ghostHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Google Docs</title>
                    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                        iframe { width: 100vw; height: 100vh; border: none; display: block; }
                    </style>
                </head>
                <body>
                    <iframe src="${gameUrl}" 
                            allow="autoplay; fullscreen; keyboard-quotas; gamepad" 
                            allowfullscreen="true"
                            sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock">
                    </iframe>
                    <script>
                        // Auto-focus the game for keyboard controls
                        window.onclick = function() { document.querySelector('iframe').focus(); };
                        window.onload = function() { document.querySelector('iframe').focus(); };
                    <\/script>
                </body>
                </html>
            `;

            // 4. Write the hidden code into the new blank tab
            win.document.open();
            win.document.write(ghostHTML);
            win.document.close();
        }
    </script>

</body>
</html>
