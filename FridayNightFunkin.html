<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- This meta tag is the first step to killing the referrer -->
    <meta name="referrer" content="no-referrer">
    <title>Game Loader</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        id="game-frame"
        src="about:blank" 
        allow="autoplay; fullscreen; keyboard-quotas; gamepad" 
        allowfullscreen="true">
    </iframe>

    <script>
        // Use the folder path + index.html
        const gameUrl = "https://uploads.ungrounded.net/alternate/1528000/1528775_alternate_113347_r142.zip";

        // This Blob contains a 'Referrer-Policy' instruction 
        // to stop Newgrounds from blocking the 404.
        const blobHTML = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta name="referrer" content="no-referrer">
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                    iframe { width: 100vw; height: 100vh; border: none; }
                </style>
            </head>
            <body>
                <iframe src="${gameUrl}" allow="autoplay; fullscreen; keyboard-quotas; gamepad" allowfullscreen="true"></iframe>
            </body>
            </html>
        `;

        const blob = new Blob([blobHTML], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);

        const frame = document.getElementById('game-frame');
        frame.src = blobUrl;

        // Ensure the game gets keyboard focus
        window.onclick = function() {
            frame.focus();
        };
    </script>

</body>
</html>
