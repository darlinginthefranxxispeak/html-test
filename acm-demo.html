<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anomalous Coffee Machine Demo </title>
    <style>
        /* This CSS removes all borders and scrolls to make the game full screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #000; /* Black background while loading */
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- This iframe pulls ONLY the game player from the server -->
    <iframe 
        src="https://html-classic.itch.zone/html/14952168/index.html" 
        allow="autoplay; fullscreen; keyboard; gamepad" 
        allowfullscreen="true" 
        scrolling="no">
    </iframe>

</body>
</html>
