<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Freak Circus - Play Now</title>
    <style>
        /* 1. Remove all scrollbars and margins from the website */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Dark background like the official site */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Style the game window to fill the screen */
        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            border: none;
        }

        /* 3. The actual game engine */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 4. Optional: Add a "Back to Official Site" button that fades away */
        .overlay-link {
            position: absolute;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 100;
            transition: 0.3s;
        }
        .overlay-link:hover {
            color: #bc0000;
        }
    </style>
</head>
<body>

    <!-- Small link back to the main site -->
    <a href="https://thefreakcircusgame.com/" class="overlay-link" target="_blank">← Official Website</a>

    <div class="game-wrapper">
        <!-- We use the Itch.io engine link because that is where the game files live -->
        <iframe 
            src="https://html-classic.itch.zone/html/14952168/index.html" 
            allow="autoplay; fullscreen; keyboard; gamepad" 
            allowfullscreen="true" 
            scrolling="no">
        </iframe>
    </div>

</body>
</html>
